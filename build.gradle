import org.springframework.boot.gradle.tasks.run.BootRun

plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.arnor4eck'
version = '0.0.1-SNAPSHOT'
description = 'spring-kod'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    runtimeOnly 'org.postgresql:postgresql:42.7.5'
    runtimeOnly 'com.h2database:h2'  // Только для разработки

    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // aws for s3
    implementation 'software.amazon.awssdk:s3:2.25.15'
    implementation 'software.amazon.awssdk:apache-client:2.25.15'
    implementation 'com.amazonaws:aws-java-sdk-s3:1.12.500'

    // File validation
    implementation 'org.apache.tika:tika-core:3.3.0'
    //CSV
    implementation("org.apache.commons:commons-csv:1.14.1")
    // Cloudinary
    implementation 'com.cloudinary:cloudinary-http44:1.39.0'
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'

    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'
    testCompileOnly 'org.projectlombok:lombok:1.18.36'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.36'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}
def globalEnvProps = readProperties()
tasks.named('test') {
    useJUnitPlatform()
}

def readProperties() {
    def envFile = file("${projectDir}/.env")
    def envProps = [:]

    if(envFile.exists()){
        def envLines = envFile.readLines()

        for (i in 0..< envLines.size()) {
            def line = envLines[i].trim()

            if(!line.isEmpty() && !line.startsWith("#")){
                def lindexOfComm = line.indexOf('#');
                if(lindexOfComm != -1)
                    line = line.substring(0, lindexOfComm)

                String[] lineParts = line.split('=')

                if(lineParts.length == 2){
                    def key = lineParts[0].trim()
                    def value = lineParts[1].trim()

                    envProps.put key, value
                    System.setProperty(key, value)
                    println "Системная переменная ${key} успешно установлена"
                }else
                    println "Пропущена строка номер ${i + 1}"
            }
        }
    }else
        println "Файл .env не найден в корне проекта"

    return envProps
}

tasks.register('bootRunDev', BootRun) {
    group = 'application'
    description = 'Run the Spring Boot application with dev profile'

    mainClass = bootRun.mainClass
    classpath = bootRun.classpath

    doFirst {
        def envProps = readProperties()
        envProps['spring.profiles.active'] = 'dev'
        envProps.each { key, value -> // системные свойства в JVM Gradle
            System.setProperty(key, value)
        }

        systemProperties = envProps  //systemProperties - это свойство задачи BootRun
    }
}

